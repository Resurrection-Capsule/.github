name: dotnet-app-release

# Reusable self-contained app publish + GitHub Release. For executables (server, launcher, hub).
# Triggers from a repo's release.yml on a `v*` tag.
#
#   jobs:
#     release:
#       uses: Resurrection-Capsule/.github/.github/workflows/dotnet-app-release.yml@v1
#       with:
#         project: ReCap.Server/ReCap.Server.csproj
#         artifact-name: ReCapServer
#         rids: '["win-x64","linux-x64"]'
#       secrets: inherit

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string
      artifact-name:
        description: Base name for the published archives (e.g. ReCapServer).
        required: true
        type: string
      rids:
        description: JSON array of runtime identifiers to publish.
        required: false
        type: string
        default: '["win-x64","linux-x64","osx-x64"]'
      dotnet-version:
        required: false
        type: string
        default: '10.0.x'

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  NuGetPackageSourceCredentials_github: Username=actions;Password=${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        rid: ${{ fromJSON(inputs.rids) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Publish
        run: >-
          dotnet publish ${{ inputs.project }}
          -c Release -r ${{ matrix.rid }} --self-contained true
          -p:ContinuousIntegrationBuild=true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish

      - name: Stage + archive
        run: |
          set -euo pipefail
          name="${{ inputs.artifact-name }}-${{ matrix.rid }}"
          mkdir -p dist
          [ -f README.md ] && cp README.md ./publish/ || true
          [ -f LICENSE ] && cp LICENSE ./publish/ || true
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            (cd publish && zip -r "../dist/${name}.zip" .)
          else
            chmod +x ./publish/* 2>/dev/null || true
            tar -czf "dist/${name}.tar.gz" -C publish .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum * > SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
